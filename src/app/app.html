<style>
  :host { display: block; }

  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 56px;
    background: #0052cc;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    color: white;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
    transition: background 0.15s;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .nav-logo:hover { background: rgba(255,255,255,0.15); color: white; }
  .nav-logo-icon {
    width: 28px; height: 28px;
    background: white;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-logo-icon svg { width: 18px; height: 18px; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
  }

  .nav-link {
    color: rgba(255,255,255,0.9);
    font-size: 0.875rem;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .nav-link:hover { background: rgba(255,255,255,0.18); color: white; }
  .nav-link.active { background: rgba(255,255,255,0.22); color: white; }

  .nav-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.25); margin: 0 6px; }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .nav-auth-btn {
    font-size: 0.875rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    transition: background 0.15s;
    cursor: pointer;
    border: none;
  }
  .btn-login {
    color: rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.15);
  }
  .btn-login:hover { background: rgba(255,255,255,0.25); color: white; }
  .btn-register {
    color: #0052cc;
    background: white;
  }
  .btn-register:hover { background: #f0f4ff; }

  .user-menu {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .user-email {
    color: rgba(255,255,255,0.85);
    font-size: 0.8rem;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .user-avatar:hover { background: rgba(255,255,255,0.35); }

  .btn-logout {
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.22); color: white; }

  .main-content {
    min-height: calc(100vh - 56px);
  }
</style>

<nav class="navbar">
  <a class="nav-logo" routerLink="/dashboard">
    <span class="nav-logo-icon">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="6" height="10" rx="1.5" fill="#0052cc"/>
        <rect x="11" y="1" width="6" height="7" rx="1.5" fill="#0052cc"/>
      </svg>
    </span>
    Trello
  </a>

  <div class="nav-links" *ngIf="authService.isAuthenticated()">
    <a class="nav-link" routerLink="/workspaces" routerLinkActive="active">Workspaces</a>
    <a class="nav-link" routerLink="/boards" routerLinkActive="active">Boards</a>
    <a class="nav-link" routerLink="/lists" routerLinkActive="active">Lists</a>
    <a class="nav-link" routerLink="/cards" routerLinkActive="active">Cards</a>
    <a class="nav-link" routerLink="/reports" routerLinkActive="active">Reports</a>
    <a class="nav-link" routerLink="/activity-logs" routerLinkActive="active">Activity</a>
    <span class="nav-divider" *ngIf="authService.role() === 'Admin'"></span>
    <a class="nav-link" routerLink="/admin" routerLinkActive="active" *ngIf="authService.role() === 'Admin'">⚙ Admin</a>
  </div>

  <div class="nav-right">
    <ng-container *ngIf="!authService.isAuthenticated()">
      <a routerLink="/login" class="nav-auth-btn btn-login">Log in</a>
      <a routerLink="/register" class="nav-auth-btn btn-register">Sign up</a>
    </ng-container>

    <ng-container *ngIf="authService.isAuthenticated()">
      <span class="user-email">{{ authService.displayName() }}</span>
      <div class="user-avatar" [title]="authService.user()?.email ?? ''">
        {{ authService.initials() }}
      </div>
      <button class="btn-logout" type="button" (click)="authService.logout()">Logout</button>
    </ng-container>
  </div>
</nav>

<main class="main-content">
  <router-outlet></router-outlet>
</main>
